<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f1115">
  <!-- iOS PWA meta tags — sin barra de Safari, fullscreen real al instalar en home -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Recorder">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Recorder">
  <link rel="apple-touch-icon" href="../icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../icon.png">
  <!-- PWA manifest para Android / Chrome (Add to Home Screen) -->
  <link rel="manifest" href="manifest.json">
  <title>Task Manager — Grabar</title>
  <link rel="icon" type="image/png" href="../icon.png">
  <link rel="stylesheet" href="recorder.css?v=31123">
</head>
<body>

  <div class="app" id="app">

    <!-- Pantalla 1: cargando sesión -->
    <section class="screen screen-loading active" id="screenLoading">
      <div class="logo-wrap">
        <img src="../icon.png" alt="Task Manager" class="logo">
        <div class="logo-text">Task Manager</div>
      </div>
      <div class="spinner"></div>
      <div class="loading-text" id="loadingText">Conectando sesión...</div>
    </section>

    <!-- Pantalla 2: error / sesión inválida -->
    <section class="screen screen-error" id="screenError">
      <div class="error-icon">⚠️</div>
      <div class="error-title" id="errorTitle">Sesión no válida</div>
      <div class="error-msg" id="errorMsg">Pedí al desktop que genere un QR nuevo.</div>
    </section>

    <!-- Pantalla 3: lista para grabar -->
    <section class="screen screen-record" id="screenRecord">
      <!-- Hidden video element — recibe el stream landscape de iOS y se dibuja
           rotado en el canvas. El display visible es el canvas. -->
      <video id="hiddenCam" autoplay muted playsinline style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none"></video>
      <!-- Canvas 1080×1920 (9:16) — preview Y fuente del MediaRecorder. El
           draw loop rota 90° si iOS da landscape, garantizando 9:16 portrait.
           width/height attributes locked desde HTML antes de JS. -->
      <canvas id="captureCanvas" width="1080" height="1920"></canvas>

      <!-- Debug overlay — muestra dimensiones del source y output para diagnosticar -->
      <div class="debug-overlay" id="debugOverlay" style="display:none"></div>

      <!-- Teleprompter overlay (draggable + resizable) -->
      <div class="teleprompter" id="teleprompter">
        <div class="tp-drag-handle" id="tpDragHandle" title="Arrastrar para mover">⋮⋮</div>
        <div class="tp-text" id="tpText"></div>
        <div class="tp-resize-handle" id="tpResizeHandle" title="Arrastrar para redimensionar"></div>
      </div>

      <!-- Top bar: cámara + tamaño de texto -->
      <div class="topbar">
        <button class="iconbtn" id="btnSwapCam" title="Cambiar cámara (front/back) — funciona durante la grabación, sin cortar el video">🔄</button>
        <button class="iconbtn" id="btnFontDown" title="Texto más chico">A−</button>
        <button class="iconbtn" id="btnFontUp" title="Texto más grande">A+</button>
        <button class="iconbtn" id="btnTpToggle" title="Mostrar/ocultar guion">📝</button>
        <button class="iconbtn" id="btnSpeedToggle" title="Mostrar/ocultar slider de velocidad">⚡</button>
      </div>

      <!-- Speed slider (vertical) -->
      <div class="speedctl" id="speedCtl">
        <div class="speedctl-label" id="speedLabel">⏸ 0.0</div>
        <input type="range" id="speedSlider" min="0" max="50" step="1" value="0" orient="vertical">
        <div class="speedctl-help">Velocidad</div>
      </div>

      <!-- Estado/pista de tiempo -->
      <div class="timer" id="timer">00:00</div>

      <!-- Bottom controls -->
      <div class="bottombar">
        <button class="iconbtn ghost" id="btnCancel" title="Cancelar todo">✕</button>
        <button class="iconbtn ghost" id="btnUndo" title="Deshacer último clip" style="display:none">↶</button>
        <div class="record-cluster">
          <div class="clips-mini" id="clipsIndicator" style="display:none">0 clips</div>
          <button class="recordbtn" id="btnRecord" aria-label="Grabar">
            <!-- Anillo de progreso TikTok-style: un arco por cada clip grabado -->
            <svg class="recordbtn-ring" viewBox="0 0 100 100" aria-hidden="true">
              <circle id="recordBtnRing" cx="50" cy="50" r="46" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="butt" transform="rotate(-90 50 50)" />
            </svg>
            <div class="recinner"></div>
          </button>
        </div>
        <button class="iconbtn ghost preview" id="btnPreviewLast" title="Ver último clip" style="display:none">👁</button>
        <button class="iconbtn ghost done" id="btnDone" title="Finalizar y previsualizar" style="display:none">✓</button>
        <button class="iconbtn ghost" id="btnPlayPause" title="Play/Pausa autoscroll">▶</button>
      </div>

      <!-- Overlay de preview rápido — lista TODOS los clips con play/delete por clip -->
      <div class="quick-preview" id="quickPreview" style="display:none">
        <div class="quick-preview-header">
          <span id="quickPreviewTitle">Mis clips</span>
          <button class="quick-preview-close" id="quickPreviewClose" title="Cerrar">✕</button>
        </div>
        <video id="quickPreviewVideo" controls playsinline></video>
        <div class="quick-preview-info" id="quickPreviewInfo"></div>
        <div class="quick-preview-actions">
          <button class="qp-action" id="quickPreviewPlayAll" title="Reproducir todos los clips seguidos">▶ Ver todo seguido</button>
        </div>
        <div class="quick-preview-clips" id="quickPreviewClips"></div>
      </div>
    </section>

    <!-- Pantalla 4: previsualización + subir -->
    <section class="screen screen-preview" id="screenPreview">
      <video id="recordedPreview" controls playsinline></video>
      <!-- Banner persistente con las dimensiones REALES del archivo grabado -->
      <div class="dim-banner" id="dimBanner"></div>
      <div class="preview-controls">
        <button class="btn btn-ghost" id="btnRetake">🔄 Repetir</button>
        <button class="btn btn-ghost" id="btnSaveLocal">💾 Guardar</button>
        <button class="btn btn-primary" id="btnUpload">📤 Enviar al desktop</button>
      </div>
    </section>

    <!-- Pantalla 5: subiendo -->
    <section class="screen screen-uploading" id="screenUploading">
      <div class="logo-wrap">
        <img src="../icon.png" alt="Task Manager" class="logo">
      </div>
      <div class="upload-title">Subiendo video...</div>
      <div class="progressbar"><div class="progressbar-fill" id="progressFill"></div></div>
      <div class="upload-pct" id="uploadPct">0%</div>
      <div class="upload-hint">No cierres esta pantalla hasta que termine.</div>
    </section>

    <!-- Pantalla 6: listo -->
    <section class="screen screen-done" id="screenDone">
      <div class="done-check">✓</div>
      <div class="done-title">¡Video enviado!</div>
      <div class="done-msg">Ya aparece en el desktop, listo para asignar al editor.</div>
      <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;justify-content:center">
        <button class="btn btn-ghost" id="btnSaveLocalAfter">💾 Guardar también en el celular</button>
        <button class="btn btn-primary" id="btnAnother">Grabar otro</button>
      </div>
    </section>

  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  </script>
  <script src="recorder.js?v=31123"></script>
</body>
</html>
