name: Build & Publish Release

# Se dispara cuando se pushea un tag tipo v2.78.0 etc.
# Tambien se puede correr manualmente desde la pestana Actions de GitHub.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            cmd: npm run publish:mac
          - os: windows-latest
            cmd: npm run publish:win
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & Publish
        run: ${{ matrix.cmd }}
        env:
          # electron-builder lee GH_TOKEN para subir assets a la release.
          # GITHUB_TOKEN es provisto automaticamente por Actions con permisos
          # de contents:write segun la directiva permissions de arriba.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
